apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: zaksoft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: postgres://zaksoft:zaksoft123@postgres:5432/zaksoft
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zaksoft-secrets
              key: JWT_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: zaksoft
spec:
  type: NodePort
  selector:
    app: auth
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30007