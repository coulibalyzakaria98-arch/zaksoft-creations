apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-service
  namespace: zaksoft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketplace
  template:
    metadata:
      labels:
        app: marketplace
    spec:
      containers:
      - name: marketplace
        image: marketplace-service:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3006
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: zaksoft-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zaksoft-secrets
              key: JWT_SECRET
        - name: REDIS_URL
          value: "redis://redis-service:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: marketplace-service
  namespace: zaksoft
spec:
  selector:
    app: marketplace
  ports:
  - port: 3006
    targetPort: 3006
