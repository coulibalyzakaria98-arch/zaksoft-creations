apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-service
  namespace: zaksoft
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video
  template:
    metadata:
      labels:
        app: video
    spec:
      containers:
      - name: video
        image: video-service:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: SVD_BRIDGE_URL
          value: "http://svd-bridge-service:7860"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zaksoft-secrets
              key: JWT_SECRET

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: video-service
  namespace: zaksoft
spec:
  selector:
    app: video
  ports:
  - port: 3002
    targetPort: 3002
