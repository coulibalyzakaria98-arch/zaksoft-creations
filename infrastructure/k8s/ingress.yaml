apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zaksoft-ingress
  namespace: zaksoft
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: zaksoft-selfsigned-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - zaksoft.local
    - api.zaksoft.local
    secretName: zaksoft-local-tls
  rules:
  - host: api.zaksoft.local
    http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      - path: /billing
        pathType: Prefix
        backend:
          service:
            name: billing-service
            port:
              number: 3005
      - path: /design
        pathType: Prefix
        backend:
          service:
            name: design-service
            port:
              number: 3003
      - path: /video
        pathType: Prefix
        backend:
          service:
            name: video-service
            port:
              number: 3002
      - path: /web-gen
        pathType: Prefix
        backend:
          service:
            name: web-gen-service
            port:
              number: 3004
      - path: /marketplace
        pathType: Prefix
        backend:
          service:
            name: marketplace-service
            port:
              number: 3006
  - host: zaksoft.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
