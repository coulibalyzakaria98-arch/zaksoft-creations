apiVersion: v1
kind: Namespace
metadata:
  name: zaksoft
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: zaksoft
type: Opaque
stringData:
  JWT_SECRET: "your-super-secret-jwt-key"
  RUNWAY_API_KEY: "your-runway-key"
  ELEVENLABS_API_KEY: "your-elevenlabs-key"
  DATABASE_URL: "postgresql://zaksoft:dev_password@postgres-service:5432/zaksoft_dev"
