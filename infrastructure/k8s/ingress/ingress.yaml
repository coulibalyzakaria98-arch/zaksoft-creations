apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zaksoft-ingress
  namespace: zaksoft
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - zaksoft-creations.com
    - api.zaksoft-creations.com
    secretName: zaksoft-tls
  rules:
  - host: zaksoft-creations.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
  - host: api.zaksoft-creations.com
    http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      - path: /teams
        pathType: Prefix
        backend:
          service:
            name: teams-service
            port:
              number: 3007
      - path: /marketplace
        pathType: Prefix
        backend:
          service:
            name: marketplace-service
            port:
              number: 3006
      - path: /billing
        pathType: Prefix
        backend:
          service:
            name: billing-service
            port:
              number: 3005
