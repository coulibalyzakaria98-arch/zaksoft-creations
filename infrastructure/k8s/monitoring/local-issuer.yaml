apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zaksoft-selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zaksoft-local-tls
  namespace: zaksoft
spec:
  secretName: zaksoft-local-tls
  issuerRef:
    name: zaksoft-selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
  - zaksoft.local
  - api.zaksoft.local
