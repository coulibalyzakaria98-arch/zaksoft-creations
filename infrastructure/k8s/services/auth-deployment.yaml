apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: zaksoft
  labels:
    app: auth
    service: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        service: backend
    spec:
      containers:
      - name: auth
        image: ghcr.io/zaksoft/auth:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: zaksoft-config
        - secretRef:
            name: zaksoft-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: zaksoft
spec:
  selector:
    app: auth
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
