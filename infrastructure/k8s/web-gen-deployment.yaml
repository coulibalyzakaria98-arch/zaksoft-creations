apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-gen-service
  namespace: zaksoft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-gen
  template:
    metadata:
      labels:
        app: web-gen
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: web-gen
        image: web-gen-service:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 3004
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zaksoft-secrets
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: web-gen-service
  namespace: zaksoft
spec:
  selector:
    app: web-gen
  ports:
  - port: 3004
    targetPort: 3004
