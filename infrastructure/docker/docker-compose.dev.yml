version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: zaksoft
      POSTGRES_DB: zaksoft_dev
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  svd-local:
    build: 
      context: ../../services/video/workers/svdBridge
    ports:
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  sd-local:
    build:
      context: ../../services/design/workers/sdBridge
    ports:
      - "7861:7861"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  design:
    build:
      context: ../../services/design
    environment:
      - REDIS_URL=redis://redis:6379
      - SD_BRIDGE_URL=http://sd-local:7861
    ports:
      - "3003:3003"
    depends_on:
      - redis
      - sd-local

  web-gen:
    build:
      context: ../../services/web-gen
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "3004:3004"
    depends_on:
      - redis

volumes:
  postgres_data:
  minio_data:
